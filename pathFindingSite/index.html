<!DOCTYPE html>
<html>
    <head>
        <title>Welcome to the shortest path site!</title>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE-edge" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body style="background-color: #011627" onload="startFunction()">
        <div id="top-container" class="container">
            <!-- TODO: make header actually center -->
            <label id="header" style="color: #8fdee6">Path Find some things</label>
            <div id="algo-pick">
                <label for="algo-options" style="color: #8fdee6">Choose an algorithm</label>
                <select name="algo-options" id="algo-options">
                    <option value="AStar">A* Algorithm</option>
                </select>
            </div>
            <div class="input" style="top: 0%; left: 80%">
                <label style="color: #8fdee6">Select what node to change</label><br>
                <input type="radio" name="nodeType" value="start" checked>
                <label for="start" style="color: #8fdee6">Start</label><br>
                <input type="radio" name="nodeType" value="finish">
                <label for="finish" style="color: #8fdee6">Finish</label><br>
                <input type="radio" name="nodeType" value="wall">
                <label for="wall" style="color: #8fdee6">Wall</label><br>
                <input type="radio" name="nodeType" value="empty">
                <label for="empty" style="color: #8fdee6">Empty</label><br>
                <!-- TODO: fix this button placement and all placements for that matter-->
                <button type="button" class="button" id="start-button">Find a Path!</button>    
            </div>
        </div>
        <button type="button" id="home-button">Home</button>
        <div id="grid">
        </div>
        <script src="script.js"></script>
    </body>
</html>
